name: Build and Push to ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_BACKEND_REPO: myapp-backend
  ECR_FRONTEND_REPO: myapp-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-session
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG -t $REGISTRY/$ECR_BACKEND_REPO:latest src/backend/
          docker push $REGISTRY/$ECR_BACKEND_REPO --all-tags

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG -t $REGISTRY/$ECR_FRONTEND_REPO:latest src/frontend/
          docker push $REGISTRY/$ECR_FRONTEND_REPO --all-tags

      - name: Run Terraform format check
        run: |
          cd terraform
          terraform fmt -check -recursive
